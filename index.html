<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RCM Energy Services — Proposal Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
--bg:#f5f6f8;--surface:#fff;--surface2:#f9fafb;--bdr:#e3e7ed;--bdr2:#eef1f5;
--t1:#1a2636;--t2:#5a6778;--t3:#97a2b0;
--blue:#4a8fd9;--blue2:#3b7ec4;--blue3:#3570b0;--bluebg:#edf4fc;
--red:#dc5050;--redbg:#fceaea;--amber:#cc8e0a;--green:#27946a;--greenbg:#e7f5ef;
--purple:#7556bd;--teal:#1a938a;--pink:#bf3d63;--gray:#8c96a5;
--sh:0 1px 4px rgba(0,0,0,.05);--sh2:0 3px 12px rgba(0,0,0,.07);--r:10px;
}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--t1);height:100vh;overflow:hidden;}
.app{display:flex;height:100vh;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:#cdd3dc;border-radius:3px;}

/* Sidebar */
.sb{width:270px;min-width:270px;background:#fff;border-right:1px solid var(--bdr);display:flex;flex-direction:column;overflow:hidden;}
.sb-logo{padding:20px 22px 16px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:10px;}
.sb-logo img{height:30px;}.sb-logo span{font-size:12px;font-weight:700;color:var(--blue);letter-spacing:-.2px;}
.sb-flt{padding:10px 14px;border-bottom:1px solid var(--bdr);}
.sb-flt input,.sb-flt select{width:100%;padding:7px 11px;border-radius:7px;border:1px solid var(--bdr);background:var(--surface2);color:var(--t1);font:12px 'DM Sans',sans-serif;margin-bottom:5px;outline:none;transition:border .2s;}
.sb-flt input:focus,.sb-flt select:focus{border-color:var(--blue);}
.fr{display:flex;gap:4px;}.fr select{flex:1;font-size:11px;padding:5px 6px;}
.sb-list{flex:1;overflow-y:auto;padding:8px 10px;display:flex;flex-direction:column;gap:4px;}
.sb-foot{padding:8px 14px;border-top:1px solid var(--bdr);}
.sb-foot button{font:500 10px 'DM Sans',sans-serif;color:var(--t3);background:none;border:none;cursor:pointer;padding:4px 8px;border-radius:4px;transition:.12s;}
.sb-foot button:hover{color:var(--red);background:var(--redbg);}

/* Sidebar tabs */
.st{display:flex;align-items:center;gap:9px;padding:10px 16px;width:100%;background:var(--blue);border:none;border-radius:8px;color:#fff;cursor:pointer;font:600 13px/1 'DM Sans',sans-serif;text-align:left;transition:all .15s;box-shadow:0 2px 6px rgba(74,143,217,.2);}
.st:hover{background:var(--blue2);}
.st.on{background:var(--blue3);box-shadow:0 2px 10px rgba(74,143,217,.35);transform:scale(1.01);}
.st-icon{width:20px;text-align:center;font-size:13px;flex-shrink:0;opacity:.85;}
.st-label{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.st-count{font-size:10px;font-weight:700;background:rgba(255,255,255,.2);border-radius:10px;padding:2px 8px;}

.sb-section{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:1px;padding:12px 6px 6px;display:flex;align-items:center;justify-content:space-between;}
.sb-section button{background:none;border:none;color:var(--blue);cursor:pointer;font:600 11px 'DM Sans',sans-serif;padding:2px 8px;border-radius:4px;transition:.12s;}
.sb-section button:hover{background:var(--bluebg);}

/* Right panel */
.mn{flex:1;overflow-y:auto;background:var(--bg);}
.pad{padding:28px 32px;max-width:1300px;}
.bd2{display:inline-block;padding:3px 9px;border-radius:5px;font-size:11px;font-weight:600;letter-spacing:.2px;white-space:nowrap;}

/* Metrics */
.mr{display:flex;gap:14px;margin-bottom:24px;flex-wrap:wrap;}
.mc{background:var(--surface);border-radius:var(--r);padding:18px 22px;border:1px solid var(--bdr);flex:1;min-width:150;box-shadow:var(--sh);}
.ml{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.7px;margin-bottom:7px;}
.mv{font-size:30px;font-weight:800;font-family:'JetBrains Mono',monospace;letter-spacing:-1px;}
.cg{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:24px;}
.cc2{background:var(--surface);border-radius:var(--r);padding:20px;border:1px solid var(--bdr);box-shadow:var(--sh);}
.ct2{font-size:13px;font-weight:700;margin-bottom:14px;}
.br{display:flex;align-items:center;gap:8px;margin-bottom:7px;}
.bl2{font-size:11px;color:var(--t2);width:128px;text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.bt{flex:1;height:16px;background:var(--surface2);border-radius:4px;overflow:hidden;border:1px solid var(--bdr2);}
.bf{height:100%;border-radius:3px;transition:width .6s ease;}
.bv{font-size:12px;font-weight:700;width:24px;text-align:right;font-family:'JetBrains Mono',monospace;}
.tw{background:var(--surface);border-radius:var(--r);border:1px solid var(--bdr);overflow:hidden;box-shadow:var(--sh);}
.thb{padding:14px 18px;border-bottom:1px solid var(--bdr);font-size:14px;font-weight:700;}
table{width:100%;border-collapse:collapse;}
th{padding:10px 14px;border-bottom:2px solid var(--bdr);font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.6px;text-align:left;background:var(--surface2);}
td{padding:10px 14px;border-bottom:1px solid var(--bdr2);font-size:13px;vertical-align:middle;}
tr.ck{cursor:pointer;transition:.12s;}tr.ck:hover{background:var(--bluebg);}

/* Account view */
.ah{padding:22px 32px;background:linear-gradient(135deg,#4a8fd9 0%,#3570b0 100%);color:#fff;}
.ah-t{font-size:22px;font-weight:800;letter-spacing:-.3px;margin-bottom:2px;}
.ah-s{font-size:13px;opacity:.8;}
.ah-a{display:flex;gap:8px;margin-top:10px;}
.ah-a button{padding:6px 14px;border-radius:7px;font:600 12px 'DM Sans',sans-serif;cursor:pointer;transition:.15s;border:none;}
.abA{background:rgba(255,255,255,.2);color:#fff;}.abA:hover{background:rgba(255,255,255,.35);}
.abR{background:rgba(255,255,255,.12);color:rgba(255,255,255,.85);}.abR:hover{background:rgba(255,255,255,.25);}
.abD{background:rgba(220,80,80,.15);color:rgba(255,200,200,.9);}.abD:hover{background:rgba(220,80,80,.35);}
.oc{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px;padding:20px 32px;}
.ocd{background:var(--surface);border-radius:var(--r);padding:18px;border:1px solid var(--bdr);box-shadow:var(--sh);cursor:pointer;transition:all .15s;}
.ocd:hover{border-color:var(--blue);box-shadow:var(--sh2);transform:translateY(-1px);}
.ocd-n{font-size:15px;font-weight:700;margin-bottom:6px;}
.ocd-d{font-size:12px;color:var(--t2);margin-bottom:10px;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.ocd-m{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;}
.ocd-r{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--t2);margin-top:6px;padding-top:6px;border-top:1px solid var(--bdr2);gap:8px;flex-wrap:wrap;}
.ocd-r strong{color:var(--t1);}
.em2{text-align:center;color:var(--t3);padding:60px 32px;font-size:14px;}

/* Calendar */
.cal-f{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.cal-f select{padding:7px 11px;border-radius:7px;border:1px solid var(--bdr);background:var(--surface);color:var(--t1);font:12px 'DM Sans',sans-serif;outline:none;}
.cal-n{display:flex;align-items:center;gap:12px;margin-bottom:16px;}
.cal-n button{background:var(--surface);border:1px solid var(--bdr);border-radius:7px;padding:6px 14px;cursor:pointer;font:600 13px 'DM Sans',sans-serif;color:var(--t1);transition:.12s;}
.cal-n button:hover{background:var(--bluebg);border-color:var(--blue);}
.cal-m{font-size:18px;font-weight:800;min-width:200px;text-align:center;}
.cal-g{display:grid;grid-template-columns:repeat(7,1fr);border:1px solid var(--bdr);border-radius:var(--r);overflow:hidden;background:var(--surface);box-shadow:var(--sh);}
.cal-h{padding:10px 6px;text-align:center;font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;background:var(--surface2);border-bottom:1px solid var(--bdr);}
.cal-d{min-height:90px;padding:4px 5px;border-right:1px solid var(--bdr2);border-bottom:1px solid var(--bdr2);}
.cal-d.ot{background:var(--surface2);opacity:.4;}.cal-d.td{background:var(--bluebg);}
.cal-dn{font-size:12px;font-weight:700;color:var(--t2);margin-bottom:3px;}.cal-d.td .cal-dn{color:var(--blue);font-weight:800;}
.cal-e{font-size:9px;padding:2px 4px;border-radius:3px;margin-bottom:2px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block;font-weight:600;}.cal-e:hover{opacity:.8;}

/* Detail */
.dh{padding:16px 28px 0;background:var(--surface);border-bottom:1px solid var(--bdr);}
.bcr{font-size:12px;color:var(--t3);margin-bottom:6px;}.bcr a{color:var(--blue);cursor:pointer;text-decoration:none;font-weight:600;}.bcr a:hover{text-decoration:underline;}
.dtr{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap;}
.dtt{font-size:22px;font-weight:800;letter-spacing:-.4px;}
.del-opp{background:none;border:1px solid var(--red);color:var(--red);padding:4px 12px;border-radius:6px;font:600 11px 'DM Sans',sans-serif;cursor:pointer;margin-left:auto;transition:.12s;}.del-opp:hover{background:var(--redbg);}
.sbar{display:flex;gap:3px;margin:10px 0 14px;}
.sst{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;}
.str2{width:100%;height:5px;border-radius:3px;}.sl2{font-size:8px;color:var(--t3);text-align:center;line-height:1.2;}.sl2.on{color:var(--t1);font-weight:700;}
.tbs{display:flex;gap:0;}
.tbn{padding:10px 18px;background:none;border:none;border-bottom:2px solid transparent;color:var(--t3);cursor:pointer;font:600 13px/1 'DM Sans',sans-serif;text-transform:capitalize;transition:.15s;}
.tbn:hover{color:var(--t1);}.tbn.on{border-bottom-color:var(--blue);color:var(--blue);}
.dbd{padding:24px 28px;}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
.crd{background:var(--surface);border-radius:var(--r);padding:22px;border:1px solid var(--bdr);box-shadow:var(--sh);}
.cdt{font-size:14px;font-weight:700;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--bdr2);}
.fi{margin-bottom:14px;}.flb{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;}
.fi input,.fi select,.fi textarea{width:100%;padding:8px 12px;border-radius:7px;border:1px solid var(--bdr);background:var(--surface);color:var(--t1);font:13px 'DM Sans',sans-serif;outline:none;transition:border .2s,box-shadow .2s;}
.fi input[type=date]{font-family:'JetBrains Mono',monospace;font-size:12px;}
.fi textarea{resize:vertical;line-height:1.6;}
.fi input:focus,.fi select:focus,.fi textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px var(--bluebg);}
.fp{display:grid;grid-template-columns:1fr 1fr;gap:12px;}.f3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}.fw{grid-column:1/-1;}
.gt{background:var(--surface);border-radius:8px;border:1px solid var(--bdr);padding:14px 18px;margin-bottom:8px;display:flex;align-items:center;gap:14px;transition:.2s;}
.gt.cur{border:2px solid var(--blue);background:var(--bluebg);box-shadow:0 2px 12px rgba(74,143,217,.1);}.gt.pst{opacity:.45;}
.gn2{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#fff;flex-shrink:0;}
.gnm{font-size:14px;font-weight:700;}.gsu{font-size:11px;color:var(--t3);margin-top:1px;}
.tkb{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
.ba{display:flex;align-items:center;gap:6px;padding:8px 16px;background:var(--blue);color:#fff;border:none;border-radius:8px;font:600 13px 'DM Sans',sans-serif;cursor:pointer;box-shadow:0 2px 6px rgba(74,143,217,.25);transition:.15s;}.ba:hover{background:var(--blue2);}
.bsm{background:none;border:none;color:var(--t3);cursor:pointer;padding:4px 6px;border-radius:5px;font-size:14px;transition:.12s;}.bsm:hover{color:var(--red);background:var(--redbg);}
.sd-t{width:100%;border-collapse:collapse;}
.sd-t th{padding:8px 10px;font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;text-align:left;background:var(--surface2);border-bottom:2px solid var(--bdr);}
.sd-t td{padding:6px 10px;border-bottom:1px solid var(--bdr2);}
.sd-t td input[type=date]{width:100%;padding:5px 8px;border-radius:5px;border:1px solid var(--bdr);font:12px 'JetBrains Mono',monospace;color:var(--t1);outline:none;background:var(--surface);}.sd-t td input[type=date]:focus{border-color:var(--blue);}
.sd-s{font-size:12px;font-weight:600;display:flex;align-items:center;gap:6px;}.sd-d{width:8px;height:8px;border-radius:50%;flex-shrink:0;}

@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
.live-bar{display:flex;align-items:center;justify-content:space-between;padding:6px 14px;border-top:1px solid var(--bdr);font-size:11px;}
.live-indicator{display:flex;align-items:center;font-weight:600;font-size:11px;}
</style>
</head>

let D=JSON.parse(JSON.stringify(SEED));
let accts=[...new Set(SEED.map(o=>o.a))];
let dataLoaded=false;
let localUpdateTime=0;

function ensureFields(){
D.forEach(o=>{if(!o.kd)o.kd={pStart:"",pDue:"",gng:"",kick:"",subm:"",expClose:""};if(!o.sd)o.sd=mkSD();ST.forEach(st=>{if(!o.sd[st])o.sd[st]={start:"",due:"",done:""}});if(!o.tk)o.tk=[];});
}

function save(){
if(!dataLoaded)return;
const now=Date.now();
localUpdateTime=now;
if(saving){clearTimeout(saving);}
saving=setTimeout(()=>{doSave();saving=null;},300);
}
function doSave(){
lastSaveTime=Date.now();
localUpdateTime=lastSaveTime;
const payload={opps:JSON.parse(JSON.stringify(D)),accts:JSON.parse(JSON.stringify(accts)),updated:lastSaveTime,updatedBy:sessionId};
setDoc(DOC_REF,payload).then(()=>{updateStatus("saved");}).catch(e=>{console.error("Save error:",e);updateStatus("error");});
}

// Unique session ID so we can ignore our own writes
const sessionId="s"+Date.now()+Math.random().toString(36).slice(2,6);

function updateStatus(state){
const el=document.getElementById("live-status");
if(!el)return;
if(state==="live"){el.innerHTML='<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#27946a;margin-right:6px;animation:pulse 2s infinite;"></span>Live';el.style.color="#27946a";}
else if(state==="saved"){el.innerHTML='<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#27946a;margin-right:6px;animation:pulse 2s infinite;"></span>Saved';el.style.color="#27946a";setTimeout(()=>updateStatus("live"),1500);}
else if(state==="syncing"){el.innerHTML='<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#4a8fd9;margin-right:6px;animation:pulse 1s infinite;"></span>Syncing...';el.style.color="#4a8fd9";}
else if(state==="error"){el.innerHTML='<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#dc5050;margin-right:6px;"></span>Offline';el.style.color="#dc5050";}
}

// Listen for real-time updates from Firebase
onSnapshot(DOC_REF,(snap)=>{
isOnline=true;
if(snap.exists()){
const d=snap.data();
// Skip if this was our own write (within last 2 seconds)
if(d.updatedBy===sessionId&&Date.now()-localUpdateTime<2000){
dataLoaded=true;
updateStatus("live");
return;
}
// Incoming update from another user
if(d.opps){D=d.opps;ensureFields();}
if(d.accts)accts=d.accts;
dataLoaded=true;
updateStatus("syncing");
R();
setTimeout(()=>updateStatus("live"),800);
}else{
// First time - seed the database
dataLoaded=true;
doSave();
}
},(error)=>{
console.error("Snapshot error:",error);
isOnline=false;
updateStatus("error");
});

function pipeV(){

function bch(t,d,cm){const mx=Math.max(...Object.values(d),1);let r="";Object.entries(d).sort((a,b)=>b[1]-a[1]).forEach(([k,v])=>{const c=(cm&&cm[k])||"var(--blue)";r+=`<div class="br"><span class="bl2">${k}</span><div class="bt"><div class="bf" style="width:${(v/mx)*100}%;background:${c}"></div></div><span class="bv">${v}</span></div>`;});return`<div class="cc2"><div class="ct2">${t}</div>${r}</div>`;}

function calV(){
const y=X.cy,m=X.cm,first=new Date(y,m,1),last=new Date(y,m+1,0),sd2=first.getDay(),td2=last.getDate();
const today=new Date(),ts=`${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,"0")}-${String(today.getDate()).padStart(2,"0")}`;

D.forEach(o=>{if(X.cf_opp!=="All"&&o.n!==X.cf_opp)return;if(X.cf_of!=="All"&&o.of!==X.cf_of)return;
if(o.kd.pDue)evts.push({d:o.kd.pDue,n:o.n,s:"Due",c:SC["Submission"],id:o.id});
if(o.kd.gng)evts.push({d:o.kd.gng,n:o.n,s:"G/NG",c:SC["Go / No-Go"],id:o.id});

ST.forEach(st=>{if(X.cf_st!=="All"&&st!==X.cf_st)return;const sd=o.sd[st];if(!sd)return;
if(sd.start&&(X.cf_dt==="All"||X.cf_dt==="start"))evts.push({d:sd.start,n:o.n,s:st.slice(0,8),c:SC[st],id:o.id});
if(sd.due&&(X.cf_dt==="All"||X.cf_dt==="due"))evts.push({d:sd.due,n:o.n,s:st.slice(0,8),c:SC[st],id:o.id});
if(sd.done&&(X.cf_dt==="All"||X.cf_dt==="done"))evts.push({d:sd.done,n:o.n,s:st.slice(0,8)+"✓",c:SC[st],id:o.id});});});
const eM={};evts.forEach(e=>{(eM[e.d]=eM[e.d]||[]).push(e);});
let hd=DY.map(d=>`<div class="cal-h">${d}</div>`).join(""),cl="";
const pm=new Date(y,m,0);for(let i=sd2-1;i>=0;i--)cl+=`<div class="cal-d ot"><div class="cal-dn">${pm.getDate()-i}</div></div>`;

const rem=(sd2+td2)%7;if(rem>0)for(let i=1;i<=7-rem;i++)cl+=`<div class="cal-d ot"><div class="cal-dn">${i}</div></div>`;

function ovw(o){const kd=o.kd||{};return`<div class="fg"><div class="crd"><div class="cdt">Opportunity Details</div>${fl("Account",`<strong style="font-size:14px">${o.a}</strong>`)}${fi("n","Opportunity Name",o.n)}${ft("d","Details",o.d,3)}<div class="fp">${fsl("tp","Type",o.tp,["RFP","RFQ","Budgetary","Estimate"])}${fsl("ct","Contract Type",o.ct,["Engineering","EPC","Hybrid","Design-Build"])}</div><div class="fp">${fi("sc","Scope Type",o.sc)}${fsl("of","Owner Office",o.of,["","Oakland","Mississauga","EPC"],["Unassigned","Oakland","Mississauga","EPC"])}</div></div><div class="crd"><div class="cdt">Commercial & Tracking</div><div class="fp">${fi("v","Estimated Value",o.v,"$0.00")}${fi("pr","Probability",o.pr,"50%")}</div><div class="fp">${fi("du","Quote Due Date",o.du)}${fsl("pi","Priority",o.pi,["High","Medium","Low"])}</div><div class="fp">${fsl("bi","Bid Status",o.bi,["New Prospect","Proposal","Submitted","Negotiation","Won","Lost"])}${fsl("st","Stage",o.st,ST)}</div><div style="margin-top:10px;border-top:1px solid var(--bdr2);padding-top:14px"><div class="cdt">Team Assignment</div><div class="fp">${fi("pm","Proposal Manager",o.pm)}${fi("tl","Technical Lead",o.tl)}</div><div class="fp">${fi("gm","General Manager",o.gm)}${fi("cl","Commercial Lead",o.cl)}</div></div></div><div class="crd fw"><div class="cdt">Key Dates</div><div class="f3">${fdt("kd.pStart","Proposal Start",kd.pStart)}${fdt("kd.pDue","Proposal Due",kd.pDue)}${fdt("kd.gng","Go/No-Go",kd.gng)}</div><div class="f3">${fdt("kd.kick","Kickoff",kd.kick)}${fdt("kd.subm","Submission",kd.subm)}${fdt("kd.expClose","Expected Close",kd.expClose)}</div></div><div class="crd fw"><div class="cdt">Latest Updates</div>${ft("up","",o.up,3,"Add latest updates...")}</div><div class="crd fw"><div class="cdt">Stage Date Tracking</div><table class="sd-t"><thead><tr><th style="width:180px">Stage</th><th>Start</th><th>Due</th><th>Completed</th></tr></thead><tbody>${ST.map(s=>{const sd=o.sd[s]||{start:"",due:"",done:""};return`<tr><td><div class="sd-s"><span class="sd-d" style="background:${SC[s]}"></span>${s}</div></td><td><input type="date" data-sd="${s}" data-sdf="start" value="${sd.start}"></td><td><input type="date" data-sd="${s}" data-sdf="due" value="${sd.due}"></td><td><input type="date" data-sd="${s}" data-sdf="done" value="${sd.done}"></td></tr>`;}).join("")}</tbody></table></div></div>`;}
function wfl(o){const si=ST.indexOf(o.st);const gl={"Opportunity Intake":"Gate 0","Technical Review":"Gate 1","Go / No-Go":"Gate 1.5","Kickoff":"Gate 2","Proposal Development":"Gate 2","Internal Review":"Gate 2.5","Proposal Approval":"Gate 3","Submission":"Gate 3","Closeout":"Gate 4+"};let g="";ST.forEach((s,i)=>{const cu=o.st===s,pa=si>i,c=SC[s];g+=`<div class="gt ${cu?"cur":""} ${pa?"pst":""}"><div class="gn2" style="background:${pa||cu?c:"var(--bdr)"};color:${pa||cu?"#fff":"var(--t3)"}">${pa?"✓":i+1}</div><div><div class="gnm" style="color:${cu?"var(--t1)":"var(--t2)"}">${s}</div><div class="gsu">${gl[s]||""}</div></div>${cu?`<div style="margin-left:auto">${bg("CURRENT",c)}</div>`:""}</div>`;});return`<div><div class="cdt">Proposal Workflow</div>${g}</div>`;}
function tsk(o){let r="";if(!o.tk.length)r=`<tr><td colspan="6" style="text-align:center;color:var(--t3);padding:28px">No tasks yet.</td></tr>`;else o.tk.forEach(t=>{const sc=t.s==="Complete"?"var(--green)":t.s==="Blocked"?"var(--red)":t.s==="In Progress"?"var(--blue)":"var(--t3)";r+=`<tr><td>${t.n}</td><td style="color:var(--t2)">${t.o||"—"}</td><td>${bg(t.r,SC[t.r]||"#97a2b0")}</td><td style="font-family:'JetBrains Mono',monospace;font-size:12px">${t.d||"—"}</td><td>${bg(t.s,sc)}</td><td><button class="bsm" data-dt="${t.i}">&#128465;</button></td></tr>`;});return`<div><div class="tkb"><div class="cdt" style="margin:0;border:0;padding:0">Tasks</div><button class="ba" id="at">+ Add Task</button></div><div class="tw"><table><thead><tr>${["Task","Owner","Stage","Due","Status",""].map(x=>`<th>${x}</th>`).join("")}</tr></thead><tbody>${r}</tbody></table></div></div>`;}
function nts(o){return`<div><div class="cdt">Notes & Risk Log</div>${ft("nt","",o.nt,18,"Notes, risks, clarifications...")}</div>`;}
function fl(l,c){return`<div class="fi"><div class="flb">${l}</div>${c}</div>`;}
function fi(k,l,v,p=""){return`<div class="fi">${l?`<div class="flb">${l}</div>`:""}<input data-f="${k}" value="${esc(v)}" placeholder="${p}"></div>`;}
function fdt(k,l,v){return`<div class="fi"><div class="flb">${l}</div><input type="date" data-f="${k}" value="${v||""}"></div>`;}
function ft(k,l,v,r,p=""){return`<div class="fi">${l?`<div class="flb">${l}</div>`:""}<textarea data-f="${k}" rows="${r}" placeholder="${p}">${esc(v)}</textarea></div>`;}
function fsl(k,l,v,opts,lbls){return`<div class="fi"><div class="flb">${l}</div><select data-f="${k}">${opts.map((x,i)=>`<option value="${x}"${v===x?" selected":""}>${lbls?lbls[i]:x}</option>`).join("")}</select></div>`;}

function bindAll(){
document.querySelectorAll("[data-sv]").forEach(x=>x.addEventListener("click",()=>{X.v=x.dataset.sv;X.s=null;X.sel=null;R();}));

document.getElementById("aRen")?.addEventListener("click",()=>{const old=X.sel;const nw=prompt("Rename:",old);if(nw&&nw.trim()&&nw!==old){const nm=nw.trim();D.forEach(o=>{if(o.a===old)o.a=nm;});const i=accts.indexOf(old);if(i>=0)accts[i]=nm;X.sel=nm;R();}});

document.getElementById("dO")?.addEventListener("click",()=>{const o=D.find(x=>x.id===X.s);if(o&&confirm(`Delete "${o.n}"?`)){const a=o.a;D=D.filter(x=>x.id!==X.s);X.s=null;X.v="account";X.sel=a;R();}});
document.querySelectorAll("[data-tb]").forEach(x=>x.addEventListener("click",()=>{X.ot=x.dataset.tb;R();}));
document.querySelectorAll("[data-f]").forEach(el=>{const fn=()=>{const o=D.find(x=>x.id===X.s);if(!o)return;const k=el.dataset.f;if(k.startsWith("kd.")){if(!o.kd)o.kd={};o.kd[k.split(".")[1]]=el.value;}else o[k]=el.value;save();};el.addEventListener("change",fn);el.addEventListener("input",fn);});
document.querySelectorAll("[data-sd]").forEach(el=>{el.addEventListener("change",()=>{const o=D.find(x=>x.id===X.s);if(!o)return;if(!o.sd)o.sd=mkSD();if(!o.sd[el.dataset.sd])o.sd[el.dataset.sd]={start:"",due:"",done:""};o.sd[el.dataset.sd][el.dataset.sdf]=el.value;save();});});
document.getElementById("at")?.addEventListener("click",()=>{const o=D.find(x=>x.id===X.s);if(o){const nm=prompt("Task name:");if(nm){o.tk.push({i:"t"+Date.now(),n:nm,o:"",r:"Opportunity Intake",d:"",s:"Not Started"});R();}}});

document.getElementById("cP")?.addEventListener("click",()=>{X.cm--;if(X.cm<0){X.cm=11;X.cy--;}R();});

document.getElementById("cf_f")?.addEventListener("change",e=>{X.cf_of=e.target.value;R();});
document.getElementById("cf_d")?.addEventListener("change",e=>{X.cf_dt=e.target.value;R();});
document.querySelectorAll(".cal-e[data-so]").forEach(x=>x.addEventListener("click",ev=>{ev.stopPropagation();X.s=x.dataset.so;R();}));
document.getElementById("rst")?.addEventListener("click",()=>{if(confirm("Reset all data? Cannot be undone.")){D=JSON.parse(JSON.stringify(SEED));accts=[...new Set(SEED.map(o=>o.a))];X={v:"pipeline",sel:null,s:null,ot:"overview",fs:"All",fo:"All",q:"",cm:new Date().getMonth(),cy:new Date().getFullYear(),cf_opp:"All",cf_st:"All",cf_of:"All",cf_dt:"All"};doSave();R();}});
}
